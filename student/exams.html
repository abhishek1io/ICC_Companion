<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam Timetable - ICC Companion</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>
    <!-- Header -->
    <div class="header">
        <div class="logo">
            <span class="logo-icon">🎓</span>
            <div>
                <div class="college-name">ICC Companion</div>
                <div class="college-short">ICON COMMERCE COLLEGE</div>
            </div>
        </div>
        <div class="user-info">
            <span class="user-name">Welcome, <strong id="userName">Student</strong></span>
            <button class="btn-logout" onclick="logout('student')">Logout</button>
        </div>
    </div>

    <!-- Navigation -->
    <nav class="nav-menu">
        <ul>
            <li><a href="dashboard.html">🏠 Dashboard</a></li>
            <li><a href="attendance.html">📊 Attendance</a></li>
            <li><a href="exams.html" class="active">📅 Exams</a></li>
            <li><a href="lost-found.html">🔍 Lost & Found</a></li>
            <li><a href="announcements.html">📢 Announcements</a></li>
        </ul>
    </nav>

    <!-- Main Content -->
    <div class="container">
        <h1 class="page-title">📅 Exam Timetable</h1>

        <div style="color: #64748b; font-size: 14px; margin-bottom: 20px;">
            Showing exams for: <strong id="filterInfo">-</strong>
        </div>

        <!-- Sessional Exams Section -->
        <div class="card">
            <h3 class="card-title" style="color: #f59e0b;">📋 Sessional Examinations</h3>
            <div id="sessionalExams">
                <div style="text-align: center; padding: 20px; color: #64748b;">Loading...</div>
            </div>
        </div>

        <!-- Final Exams Section -->
        <div class="card">
            <h3 class="card-title" style="color: #ef4444;">📝 Final Examinations</h3>
            <div id="finalExams">
                <div style="text-align: center; padding: 20px; color: #64748b;">Loading...</div>
            </div>
        </div>
    </div>

    <script src="../js/main.js"></script>
    <script>
        // Check if logged in
        if (!checkStudentLogin()) {
            // Will redirect to login
        }

        // Get student info and display
        var student = getStudentInfo();
        document.getElementById('userName').textContent = student.name;
        document.getElementById('filterInfo').textContent = student.dept + ' - Semester ' + student.semester;

        // Load exams
        loadExams();

        function loadExams() {
            var url = '../api/get-exams.php?dept=' + student.dept + '&semester=' + student.semester;

            fetch(url)
                .then(function (res) { return res.json(); })
                .then(function (data) {
                    if (data.success) {
                        // Separate by type
                        var sessional = data.data.filter(function (e) { return e.exam_type === 'sessional'; });
                        var final = data.data.filter(function (e) { return e.exam_type === 'final'; });

                        // Render each section
                        renderExamSection('sessionalExams', sessional, 'Sessional');
                        renderExamSection('finalExams', final, 'Final Examination');
                    } else {
                        document.getElementById('sessionalExams').innerHTML = '<div style="color: #64748b; text-align: center;">No exams found</div>';
                        document.getElementById('finalExams').innerHTML = '<div style="color: #64748b; text-align: center;">No exams found</div>';
                    }
                })
                .catch(function (error) {
                    console.error('Error:', error);
                });
        }

        function renderExamSection(containerId, exams, typeName) {
            var container = document.getElementById(containerId);

            if (exams.length === 0) {
                container.innerHTML = '<div style="color: #64748b; text-align: center; padding: 20px;">No ' + typeName + ' exams scheduled yet.</div>';
                return;
            }

            var html = '';
            exams.forEach(function (exam) {
                var days = daysRemaining(exam.exam_date);
                var daysText = days < 0 ? 'Completed' : (days === 0 ? 'Today!' : (days === 1 ? '1 day left' : days + ' days left'));
                var daysClass = days < 0 ? 'badge-secondary' : (days <= 7 ? 'badge-danger' : (days <= 14 ? 'badge-warning' : 'badge-success'));

                html += '<div class="exam-item" style="display: flex; align-items: center; padding: 15px; border-bottom: 1px solid #e2e8f0;">';

                // Date Box
                html += '<div style="text-align: center; min-width: 70px; margin-right: 20px;">';
                html += '<div style="font-size: 24px; font-weight: bold; color: var(--primary);">' + new Date(exam.exam_date).getDate() + '</div>';
                html += '<div style="font-size: 12px; color: #64748b; text-transform: uppercase;">' + new Date(exam.exam_date).toLocaleString('en', { month: 'short', year: 'numeric' }) + '</div>';
                html += '</div>';

                // Details
                html += '<div style="flex: 1;">';
                html += '<div style="font-weight: 600; color: var(--dark);">' + exam.subject_name + '</div>';
                html += '<div style="font-size: 13px; color: #64748b; margin-top: 4px;">';
                html += '🕐 ' + formatTime(exam.start_time) + ' - ' + formatTime(exam.end_time) + ' | ';
                html += '📍 ' + exam.room;
                html += '</div>';

                // Attachment if exists
                if (exam.attachment_url) {
                    html += '<div style="margin-top: 8px;">';
                    html += '<a href="' + exam.attachment_url + '" target="_blank" class="btn btn-sm btn-outline" style="font-size: 12px;">📎 View Attachment</a>';
                    html += '</div>';
                }
                html += '</div>';

                // Days Badge
                html += '<div>';
                html += '<span class="badge ' + daysClass + '">' + daysText + '</span>';
                html += '</div>';

                html += '</div>';
            });

            container.innerHTML = html;
        }

        function formatTime(timeStr) {
            var parts = timeStr.split(':');
            var hours = parseInt(parts[0]);
            var minutes = parts[1];
            var ampm = hours >= 12 ? 'PM' : 'AM';
            hours = hours % 12 || 12;
            return hours + ':' + minutes + ' ' + ampm;
        }
    </script>
</body>

</html>
