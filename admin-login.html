<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - ICC Companion</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="login-page">
        <div class="login-box">
            <div class="logo">
                <div class="logo-icon">🔐</div>
            </div>
            <h1>Admin Login</h1>
            <p class="subtitle">ICC Companion</p>

            <div id="errorMsg" class="alert alert-error hidden"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="Enter username" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter password" required>
                </div>

                <button type="submit" class="btn btn-primary">Login</button>
            </form>

            <div class="switch-login">
                <a href="index.html">← Back to Home</a>
            </div>

            <div
                style="margin-top: 20px; padding: 15px; background: #f8fafc; border-radius: 5px; font-size: 12px; color: #64748b;">
                <strong>Demo Credentials:</strong><br>
                Username: admin<br>
                Password: admin123
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', function (e) {
            e.preventDefault();

            var username = document.getElementById('username').value.trim();
            var password = document.getElementById('password').value;
            var errorMsg = document.getElementById('errorMsg');

            // Hide previous error
            errorMsg.classList.add('hidden');

            // Validate inputs
            if (!username || !password) {
                showError('Please fill in all fields');
                return;
            }

            // Send login request
            var formData = new FormData();
            formData.append('username', username);
            formData.append('password', password);

            fetch('api/admin-login.php', {
                method: 'POST',
                body: formData
            })
                .then(function (response) {
                    return response.json();
                })
                .then(function (data) {
                    if (data.success) {
                        // Store admin info in session storage
                        sessionStorage.setItem('adminId', data.data.admin_id);
                        sessionStorage.setItem('adminName', data.data.name);
                        sessionStorage.setItem('adminRole', data.data.role);

                        // Redirect to admin dashboard
                        window.location.href = 'admin/dashboard.html';
                    } else {
                        showError(data.message);
                    }
                })
                .catch(function (error) {
                    showError('Login failed. Please try again.');
                    console.error('Error:', error);
                });
        });

        function showError(message) {
            var errorMsg = document.getElementById('errorMsg');
            errorMsg.textContent = message;
            errorMsg.classList.remove('hidden');
        }
    </script>
</body>

</html>
