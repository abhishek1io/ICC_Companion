<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - ICC Companion</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="login-page">
        <div class="login-box">
            <div class="logo">
                <div class="logo-icon">🔐</div>
            </div>
            <h1>Admin Login</h1>
            <p class="subtitle">ICC Companion</p>

            <div id="errorMsg" class="alert alert-error hidden"></div>

            <div class="login-tabs" style="display: flex; gap: 10px; margin-bottom: 20px;">
                <button type="button" class="btn btn-outline active" id="adminTab" onclick="setLoginType('admin')"
                    style="flex: 1; border-radius: 8px; font-size: 14px; padding: 10px;">👨‍💼 Staff</button>
                <button type="button" class="btn btn-outline" id="superTab" onclick="setLoginType('super-admin')"
                    style="flex: 1; border-radius: 8px; font-size: 14px; padding: 10px;">👑 Super Admin</button>
            </div>

            <form id="loginForm">
                <input type="hidden" id="loginType" value="admin">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="Enter username" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter password" required>
                </div>

                <button type="submit" class="btn btn-primary" id="loginBtn">Login as Staff</button>
            </form>

            <div class="switch-login">
                <a href="index.html">← Back to Home</a>
            </div>

            <div id="demoCreds"
                style="margin-top: 20px; padding: 15px; background: #f8fafc; border-radius: 5px; font-size: 12px; color: #64748b;">
                <strong>Staff Credentials:</strong><br>
                Username: staff | Password: staff123
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script>
        // Check if running on Live Server
        if (window.location.port === '5500') {
            alert('CRITICAL: You are using VS Code Live Server (port 5500). PHP will NOT work here.\n\nPlease use: http://localhost/ICC_Companion/admin-login.html');
            document.body.innerHTML = '<div style="background:#fff; height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; font-family:sans-serif; text-align:center; padding:20px;"><h1 style="color:#e11d48; margin-bottom:10px;">XAMPP Required</h1><p style="color:#4b5563; font-size:18px;">This project requires a PHP server. Please use the URL below:</p><code style="background:#f3f4f6; padding:10px 20px; border-radius:8px; font-weight:bold; margin:20px 0; color:#1f2937;">http://localhost/ICC_Companion/admin-login.html</code><p><a href="http://localhost/ICC_Companion/admin-login.html" style="color:#2563eb; text-decoration:none; font-weight:bold;">Click here to open in XAMPP</a></p></div>';
            throw new Error('PHP required');
        }

        function setLoginType(type) {
            document.getElementById('loginType').value = type;
            if (type === 'super-admin') {
                document.getElementById('superTab').classList.add('active');
                document.getElementById('adminTab').classList.remove('active');
                document.getElementById('loginBtn').textContent = 'Login as Super Admin';
                document.getElementById('demoCreds').innerHTML = '<strong>Super Admin Credentials:</strong><br>Username: admin | Password: admin123';
            } else {
                document.getElementById('adminTab').classList.add('active');
                document.getElementById('superTab').classList.remove('active');
                document.getElementById('loginBtn').textContent = 'Login as Staff';
                document.getElementById('demoCreds').innerHTML = '<strong>Staff Credentials:</strong><br>Username: staff | Password: staff123';
            }
        }

        document.getElementById('loginForm').addEventListener('submit', function (e) {
            e.preventDefault();

            var username = document.getElementById('username').value.trim();
            var password = document.getElementById('password').value;
            var expectedRole = document.getElementById('loginType').value;
            var errorMsg = document.getElementById('errorMsg');

            // Hide previous error
            errorMsg.classList.add('hidden');

            // Validate inputs
            if (!username || !password) {
                showError('Please fill in all fields');
                return;
            }

            // Send login request
            var formData = new FormData();
            formData.append('username', username);
            formData.append('password', password);

            fetch('api/admin-login.php', {
                method: 'POST',
                body: formData
            })
                .then(function (response) {
                    return response.json();
                })
                .then(function (data) {
                    if (data.success) {
                        // Check if role matches what was selected (optional, but good for UX)
                        if (data.data.role !== expectedRole && expectedRole === 'super-admin') {
                            showError('This account does not have Super Admin privileges.');
                            return;
                        }

                        // Store admin info in session storage
                        sessionStorage.setItem('adminId', data.data.admin_id);
                        sessionStorage.setItem('adminName', data.data.name);
                        sessionStorage.setItem('adminRole', data.data.role);
                        sessionStorage.setItem('assignedDept', data.data.assigned_dept);
                        sessionStorage.setItem('assignedSemester', data.data.assigned_semester);

                        // Redirect to admin dashboard
                        window.location.href = 'admin/dashboard.html';
                    } else {
                        showError(data.message);
                    }
                })
                .catch(function (error) {
                    showError('Login failed: ' + error.message);
                    console.error('Error:', error);
                });
        });

        function showError(message) {
            var errorMsg = document.getElementById('errorMsg');
            errorMsg.textContent = message;
            errorMsg.classList.remove('hidden');
        }
    </script>
</body>

</html>
