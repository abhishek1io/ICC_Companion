<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Login - ICC Companion</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="login-page">
        <div class="login-box">
            <div class="logo">
                <div class="logo-icon">👨‍🎓</div>
            </div>
            <h1>Student Login</h1>
            <p class="subtitle">ICC Companion</p>

            <div id="errorMsg" class="alert alert-error hidden"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="rollNumber">Roll Number</label>
                    <input type="text" id="rollNumber" name="rollNumber" placeholder="e.g., UT-123-456-7890" required>
                </div>

                <div class="form-group">
                    <label for="dob">Date of Birth</label>
                    <input type="date" id="dob" name="dob" required>
                </div>

                <button type="submit" class="btn btn-primary">Login</button>
            </form>

            <div class="switch-login">
                <a href="index.html">← Back to Home</a>
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script>
        // Check if running on Live Server
        if (window.location.port === '5500') {
            alert('CRITICAL: You are using VS Code Live Server (port 5500). PHP will NOT work here.\n\nPlease use: http://localhost/ICC_Companion/student-login.html');
            document.body.innerHTML = '<div style="background:#fff; height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; font-family:sans-serif; text-align:center; padding:20px;"><h1 style="color:#e11d48; margin-bottom:10px;">XAMPP Required</h1><p style="color:#4b5563; font-size:18px;">This project requires a PHP server. Please use the URL below:</p><code style="background:#f3f4f6; padding:10px 20px; border-radius:8px; font-weight:bold; margin:20px 0; color:#1f2937;">http://localhost/ICC_Companion/student-login.html</code><p><a href="http://localhost/ICC_Companion/student-login.html" style="color:#2563eb; text-decoration:none; font-weight:bold;">Click here to open in XAMPP</a></p></div>';
            throw new Error('PHP required');
        }

        document.getElementById('loginForm').addEventListener('submit', function (e) {
            e.preventDefault();

            var rollNumber = document.getElementById('rollNumber').value.trim().toUpperCase();
            var dob = document.getElementById('dob').value;
            var errorMsg = document.getElementById('errorMsg');

            // Hide previous error
            errorMsg.classList.add('hidden');

            // Validate inputs
            if (!rollNumber || !dob) {
                showError('Please fill in all fields');
                return;
            }

            // Send login request
            var formData = new FormData();
            formData.append('roll_number', rollNumber);
            formData.append('dob', dob);

            fetch('api/student-login.php', {
                method: 'POST',
                body: formData
            })
                .then(function (response) {
                    return response.json();
                })
                .then(function (data) {
                    if (data.success) {
                        // Store student info in session storage
                        sessionStorage.setItem('studentRoll', data.data.roll_number);
                        sessionStorage.setItem('studentName', data.data.name);
                        sessionStorage.setItem('studentDept', data.data.dept_code);
                        sessionStorage.setItem('studentSemester', data.data.semester);

                        // Redirect to dashboard
                        window.location.href = 'student/dashboard.html';
                    } else {
                        showError(data.message);
                    }
                })
                .catch(function (error) {
                    showError('Login failed: ' + error.message + '. Please ensure you are at http://localhost/ICC_Companion/');
                    console.error('Error:', error);
                });
        });

        function showError(message) {
            var errorMsg = document.getElementById('errorMsg');
            errorMsg.textContent = message;
            errorMsg.classList.remove('hidden');
        }
    </script>
</body>

</html>
