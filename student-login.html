<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Login - ICC Companion</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="login-page">
        <div class="login-box">
            <div class="logo">
                <div class="logo-icon">👨‍🎓</div>
            </div>
            <h1>Student Login</h1>
            <p class="subtitle">ICC Companion</p>

            <div id="errorMsg" class="alert alert-error hidden"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="rollNumber">Roll Number</label>
                    <input type="text" id="rollNumber" name="rollNumber" placeholder="e.g., BCA23001" required>
                </div>

                <div class="form-group">
                    <label for="dob">Date of Birth</label>
                    <input type="date" id="dob" name="dob" required>
                </div>

                <button type="submit" class="btn btn-primary">Login</button>
            </form>

            <div class="switch-login">
                <a href="index.html">← Back to Home</a>
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', function (e) {
            e.preventDefault();

            var rollNumber = document.getElementById('rollNumber').value.trim().toUpperCase();
            var dob = document.getElementById('dob').value;
            var errorMsg = document.getElementById('errorMsg');

            // Hide previous error
            errorMsg.classList.add('hidden');

            // Validate inputs
            if (!rollNumber || !dob) {
                showError('Please fill in all fields');
                return;
            }

            // Send login request
            var formData = new FormData();
            formData.append('roll_number', rollNumber);
            formData.append('dob', dob);

            fetch('api/student-login.php', {
                method: 'POST',
                body: formData
            })
                .then(function (response) {
                    return response.json();
                })
                .then(function (data) {
                    if (data.success) {
                        // Store student info in session storage
                        sessionStorage.setItem('studentRoll', data.data.roll_number);
                        sessionStorage.setItem('studentName', data.data.name);
                        sessionStorage.setItem('studentDept', data.data.dept_code);
                        sessionStorage.setItem('studentSemester', data.data.semester);

                        // Redirect to dashboard
                        window.location.href = 'student/dashboard.html';
                    } else {
                        showError(data.message);
                    }
                })
                .catch(function (error) {
                    showError('Login failed. Please try again.');
                    console.error('Error:', error);
                });
        });

        function showError(message) {
            var errorMsg = document.getElementById('errorMsg');
            errorMsg.textContent = message;
            errorMsg.classList.remove('hidden');
        }
    </script>
</body>

</html>
