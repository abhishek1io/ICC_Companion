<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Exams - ICC Companion</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>
    <!-- Header -->
    <div class="header" style="background-color: #1e293b;">
        <div class="logo">
            <span class="logo-icon">🔐</span>
            <div>
                <div class="college-name">ICC Companion - Admin</div>
                <div class="college-short">ICON COMMERCE COLLEGE</div>
            </div>
        </div>
        <div class="user-info">
            <span class="user-name">Admin: <strong id="adminName">-</strong></span>
            <button class="btn-logout" onclick="logout('admin')">Logout</button>
        </div>
    </div>

    <!-- Navigation -->
    <nav class="nav-menu">
        <ul>
            <li><a href="dashboard.html">🏠 Dashboard</a></li>
            <li><a href="students.html">👥 Students</a></li>
            <li><a href="attendance.html">📊 Attendance</a></li>
            <li><a href="exams.html" class="active">📅 Exams</a></li>
            <li><a href="lost-found.html">🔍 Lost & Found</a></li>
            <li><a href="announcements.html">📢 Announcements</a></li>
        </ul>
    </nav>

    <!-- Main Content -->
    <div class="container">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h1 class="page-title" style="margin-bottom: 0;">📅 Manage Exam Timetable</h1>
            <button class="btn btn-primary" onclick="showAddForm()">+ Add Exam</button>
        </div>

        <!-- Exams Table -->
        <div class="card">
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Subject</th>
                            <th>Dept</th>
                            <th>Sem</th>
                            <th>Time</th>
                            <th>Room</th>
                            <th>Type</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="examsTable">
                        <tr>
                            <td colspan="8" style="text-align: center; padding: 40px; color: #64748b;">Loading...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Add/Edit Exam Modal -->
    <div id="examModal"
        style="display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center;">
        <div class="card" style="width: 90%; max-width: 500px;">
            <h3 id="modalTitle" class="card-title">Add Exam</h3>
            <form id="examForm">
                <input type="hidden" id="editId" value="">

                <div class="form-row">
                    <div class="form-group">
                        <label for="dept">Department *</label>
                        <select id="dept" required onchange="loadSubjectOptions()">
                            <option value="">Select</option>
                            <option value="BCA">BCA</option>
                            <option value="BBA">BBA</option>
                            <option value="BA">BA</option>
                            <option value="BCOM">BCOM</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="semester">Semester *</label>
                        <select id="semester" required onchange="loadSubjectOptions()">
                            <option value="">Select</option>
                            <option value="1">1</option>
                            <option value="2">2</option>
                            <option value="3">3</option>
                            <option value="4">4</option>
                            <option value="5">5</option>
                            <option value="6">6</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="subject">Subject *</label>
                    <select id="subject" required>
                        <option value="">Select department & semester first</option>
                    </select>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="examDate">Exam Date *</label>
                        <input type="date" id="examDate" required>
                    </div>
                    <div class="form-group">
                        <label for="examType">Exam Type *</label>
                        <select id="examType" required>
                            <option value="mid-term">Mid-term</option>
                            <option value="end-term">End-term</option>
                            <option value="internal">Internal</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="startTime">Start Time *</label>
                        <input type="time" id="startTime" required>
                    </div>
                    <div class="form-group">
                        <label for="endTime">End Time *</label>
                        <input type="time" id="endTime" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="room">Room/Hall *</label>
                    <input type="text" id="room" required placeholder="e.g., Lab 101, Hall A">
                </div>

                <div style="display: flex; gap: 10px; margin-top: 20px;">
                    <button type="submit" class="btn btn-primary">Save Exam</button>
                    <button type="button" class="btn btn-outline" onclick="closeModal()">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../js/main.js"></script>
    <script>
        if (!checkAdminLogin()) { }

        var admin = getAdminInfo();
        document.getElementById('adminName').textContent = admin.name;

        loadExams();

        function loadExams() {
            fetch('../api/get-exams.php')
                .then(function (res) { return res.json(); })
                .then(function (data) {
                    var tbody = document.getElementById('examsTable');

                    if (data.success && data.data.length > 0) {
                        var html = '';
                        data.data.forEach(function (e) {
                            html += '<tr>';
                            html += '<td><strong>' + formatDate(e.exam_date) + '</strong></td>';
                            html += '<td>' + e.subject_name + '</td>';
                            html += '<td><span class="badge badge-info">' + e.dept_code + '</span></td>';
                            html += '<td>' + e.semester + '</td>';
                            html += '<td>' + formatTimeStr(e.start_time) + ' - ' + formatTimeStr(e.end_time) + '</td>';
                            html += '<td>' + e.room + '</td>';
                            html += '<td><span class="badge badge-secondary">' + e.exam_type + '</span></td>';
                            html += '<td>';
                            html += '<button class="btn btn-sm btn-danger" onclick="deleteExam(' + e.exam_id + ')">Delete</button>';
                            html += '</td>';
                            html += '</tr>';
                        });
                        tbody.innerHTML = html;
                    } else {
                        tbody.innerHTML = '<tr><td colspan="8" style="text-align: center; padding: 40px; color: #64748b;">No exams scheduled</td></tr>';
                    }
                });
        }

        function formatTimeStr(timeStr) {
            var parts = timeStr.split(':');
            var hours = parseInt(parts[0]);
            var minutes = parts[1];
            var ampm = hours >= 12 ? 'PM' : 'AM';
            hours = hours % 12 || 12;
            return hours + ':' + minutes + ' ' + ampm;
        }

        function loadSubjectOptions() {
            var dept = document.getElementById('dept').value;
            var sem = document.getElementById('semester').value;

            if (!dept || !sem) {
                document.getElementById('subject').innerHTML = '<option value="">Select department & semester first</option>';
                return;
            }

            fetch('../api/get-subjects.php?dept=' + dept + '&semester=' + sem)
                .then(function (res) { return res.json(); })
                .then(function (data) {
                    if (data.success && data.data.length > 0) {
                        var html = '<option value="">Select subject</option>';
                        data.data.forEach(function (s) {
                            html += '<option value="' + s.subject_id + '">' + s.subject_name + '</option>';
                        });
                        document.getElementById('subject').innerHTML = html;
                    } else {
                        document.getElementById('subject').innerHTML = '<option value="">No subjects found</option>';
                    }
                });
        }

        function showAddForm() {
            document.getElementById('modalTitle').textContent = 'Add Exam';
            document.getElementById('examForm').reset();
            document.getElementById('editId').value = '';
            document.getElementById('examModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('examModal').style.display = 'none';
        }

        function deleteExam(id) {
            if (!confirm('Delete this exam?')) return;

            var formData = new FormData();
            formData.append('exam_id', id);

            fetch('../api/delete-exam.php', {
                method: 'POST',
                body: formData
            })
                .then(function (res) { return res.json(); })
                .then(function (data) {
                    if (data.success) {
                        showAlert('Exam deleted', 'success');
                        loadExams();
                    } else {
                        showAlert(data.message, 'error');
                    }
                });
        }

        document.getElementById('examForm').addEventListener('submit', function (e) {
            e.preventDefault();

            var formData = new FormData();
            formData.append('subject_id', document.getElementById('subject').value);
            formData.append('exam_date', document.getElementById('examDate').value);
            formData.append('start_time', document.getElementById('startTime').value);
            formData.append('end_time', document.getElementById('endTime').value);
            formData.append('room', document.getElementById('room').value);
            formData.append('exam_type', document.getElementById('examType').value);

            fetch('../api/add-exam.php', {
                method: 'POST',
                body: formData
            })
                .then(function (res) { return res.json(); })
                .then(function (data) {
                    if (data.success) {
                        showAlert('Exam added', 'success');
                        closeModal();
                        loadExams();
                    } else {
                        showAlert(data.message, 'error');
                    }
                });
        });
    </script>
</body>

</html>
